# .github/workflows/deploy-dev.yml
name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "Deployment cancelled. You must type 'deploy' to confirm."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ThePredictions.sln

      - name: Build solution
        run: dotnet build ThePredictions.sln --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Run all tests
        run: dotnet test ThePredictions.sln --no-build --configuration Release --verbosity normal

      - name: Publish Web application
        run: dotnet publish src/ThePredictions.Web/ThePredictions.Web.csproj --configuration Release --output ./publish --no-build -p:PublishProfile="Publish to Development"

      - name: Create app_offline.htm
        run: |
          cat > app_offline.htm << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>The Predictions - Maintenance</title>
              <style>
                  body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f5f5f5; }
                  h1 { color: #333; }
                  p { color: #666; }
              </style>
          </head>
          <body>
              <h1>We'll be right back</h1>
              <p>The Predictions is being updated. Please try again in a few minutes.</p>
          </body>
          </html>
          EOF

      - name: Take site offline
        run: |
          curl -T app_offline.htm \
            "ftp://${{ vars.FTP_SERVER }}/htdocs/app_offline.htm" \
            --user "${{ secrets.DEV_FTP_USERNAME }}:${{ secrets.DEV_FTP_PASSWORD }}" \
            --ftp-pasv

      - name: Wait for IIS to release DLL locks
        run: sleep 10

      - name: Deploy to dev site via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_SERVER }}
          username: ${{ secrets.DEV_FTP_USERNAME }}
          password: ${{ secrets.DEV_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /htdocs/
          dangerous-clean-slate: true
          exclude: |
            appsettings.Development.Secrets.json

      - name: Deployment complete
        run: |
          echo "Deployment to development complete!"
          echo "Site: https://dev.thepredictions.co.uk"
