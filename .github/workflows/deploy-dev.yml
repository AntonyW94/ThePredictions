# .github/workflows/deploy-dev.yml
name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "Deployment cancelled. You must type 'deploy' to confirm."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ThePredictions.sln

      - name: Build solution
        run: dotnet build ThePredictions.sln --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Run all tests
        run: dotnet test ThePredictions.sln --no-build --configuration Release --verbosity normal

      - name: Publish Web application
        run: |
          dotnet publish src/ThePredictions.Web/ThePredictions.Web.csproj \
            --configuration Release \
            --output ./publish \
            --no-build \
            -p:PublishProfile=Development

      - name: Write appsettings secrets
        run: echo '${{ secrets.DEV_APPSETTINGS_SECRETS }}' > ./publish/appsettings.Development.Secrets.json

      - name: Deploy to dev site via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_SERVER }}
          username: ${{ secrets.DEV_FTP_USERNAME }}
          password: ${{ secrets.DEV_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /htdocs/
          dangerous-clean-slate: true

      - name: Warm up site
        run: |
          echo "Warming up site to avoid cold-start delay..."
          curl --retry 5 --retry-delay 10 --retry-all-errors \
            --max-time 120 -o /dev/null -s -w "HTTP %{http_code} in %{time_total}s\n" \
            "https://dev.thepredictions.co.uk"

      - name: Deployment complete
        run: |
          echo "Deployment to development complete!"
          echo "Site: https://dev.thepredictions.co.uk"
