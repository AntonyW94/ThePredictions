<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>The Predictions - The Ultimate Football Prediction Game</title>

    <!-- Social Media Meta Tags -->
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.thepredictions.co.uk/">
    <meta property="og:title" content="The Predictions - The Ultimate Football Prediction Game">
    <meta property="og:description" content="Challenge your friends, prove your football knowledge, and top the leaderboard. Your journey to prediction glory starts here.">
    <meta property="og:image" content="https://www.thepredictions.co.uk/images/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.thepredictions.co.uk/">
    <meta property="twitter:title" content="The Predictions - The Ultimate Football Prediction Game">
    <meta property="twitter:description" content="Challenge your friends, prove your football knowledge, and top the leaderboard. Your journey to prediction glory starts here.">
    <meta property="twitter:image" content="https://www.thepredictions.co.uk/images/logo.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/app.css" />

    <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone-60x60.png">
    <link rel="apple-touch-icon" sizes="60x60" href="images/apple-touch-icon-ipad-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touch-icon-iphone-retina-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="images/apple-touch-icon-ipad-retina-152x152.png">
</head>

<body>
    <div id="app">
        <div class="app-loading-container">
            <div class="spinner"></div>
            <p>Loading The Predictions...</p>
        </div>
    </div>

    <script>
        (function () {
            var path = window.location.pathname;
            var adminPaths = ['/admin/', '/leagues'];
            var isAdmin = adminPaths.some(function (p) { return path.startsWith(p); });
            if (isAdmin) {
                var container = document.querySelector('.app-loading-container');
                if (container) {
                    container.classList.add('app-loading-light');
                }
            }
        })();
    </script>

    <div id="blazor-error-ui">
        <span id="blazor-error-message">An unhandled error has occurred.</span>
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        window.addEventListener("error", function (e) {
            console.error("[Blazor] Unhandled error:", e.message, "\nSource:", e.filename, "Line:", e.lineno, "Col:", e.colno, "\nError:", e.error);
            var ui = document.getElementById("blazor-error-ui");
            if (ui) {
                ui.style.display = "none";
            }
        });
        window.addEventListener("unhandledrejection", function (e) {
            var detail = e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : "Unknown rejection";
            console.error("[Blazor] Unhandled promise rejection:", detail);
            var ui = document.getElementById("blazor-error-ui");
            if (ui) {
                ui.style.display = "none";
            }
        });

        // Observe the error UI element and hide it when Blazor tries to show it
        document.addEventListener("DOMContentLoaded", function () {
            var ui = document.getElementById("blazor-error-ui");
            if (ui) {
                var observer = new MutationObserver(function () {
                    if (ui.style.display !== "none") {
                        console.warn("[Blazor] Error UI was shown - suppressing banner. Check console for error details above.");
                        ui.style.display = "none";
                    }
                });
                observer.observe(ui, { attributes: true, attributeFilter: ["style"] });
            }
        });
    </script>

    <!-- Javascript Files -->
    <script src="js/interop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
</body>
</html>
